alloy:
  configMap:
    create: true
    content: |-
      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.kubernetes "services" {
        role = "service"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      // ── Kubelet metrics ──
      prometheus.scrape "kubelet" {
        targets    = discovery.kubernetes.nodes.targets
        forward_to = [prometheus.relabel.filter.receiver]
        scheme     = "https"
        tls_config {
          insecure_skip_verify = true
        }
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        scrape_interval   = "30s"
        metrics_path      = "/metrics"
        job_name          = "kubelet"
        clustering { enabled = true }
      }

      // ── cAdvisor (container metrics) ──
      prometheus.scrape "cadvisor" {
        targets    = discovery.kubernetes.nodes.targets
        forward_to = [prometheus.relabel.filter.receiver]
        scheme     = "https"
        tls_config {
          insecure_skip_verify = true
        }
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        scrape_interval   = "30s"
        metrics_path      = "/metrics/cadvisor"
        job_name          = "cadvisor"
        clustering { enabled = true }
      }

      // ── kube-state-metrics ──
      prometheus.scrape "kube_state_metrics" {
        targets    = [{
          __address__ = "monitoring-kube-state-metrics.monitoring.svc:8080",
        }]
        forward_to      = [prometheus.relabel.filter.receiver]
        scrape_interval = "30s"
        job_name        = "kube-state-metrics"
        clustering { enabled = true }
      }

      // ── node-exporter ──
      discovery.relabel "node_exporter_filter" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          regex = "prometheus-node-exporter"
          action = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label = "namespace"
        }
      }

      prometheus.scrape "node_exporter" {
        targets    = discovery.relabel.node_exporter_filter.output
        forward_to = [prometheus.relabel.filter.receiver]
        scrape_interval = "30s"
        job_name  = "node-exporter"
        clustering { enabled = true }
      }

      // ── Pod annotations (prometheus.io/scrape: true) ──
      discovery.relabel "pod_annotations_filter" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          regex  = "true"
          action = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          regex  = "(.+)"
          target_label = "__metrics_path__"
          replacement  = "$1"
        }
        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          regex  = "([^:]+)(?::\\d+)?;(\\d+)"
          target_label = "__address__"
          replacement  = "$1:$2"
        }
      }

      prometheus.scrape "pod_annotations" {
        targets    = discovery.relabel.pod_annotations_filter.output
        forward_to = [prometheus.relabel.filter.receiver]
        scrape_interval = "30s"
        job_name  = "kubernetes-pods"
        clustering { enabled = true }
      }

      // ── Monitoring stack self-scrape ──
      prometheus.scrape "monitoring_components" {
        targets = [
          { __address__ = "monitoring-mimir-gateway.monitoring.svc:80",        job = "mimir" },
          { __address__ = "monitoring-loki.monitoring.svc:3100",    job = "loki" },
          { __address__ = "minio.monitoring.svc:9000",              job = "minio" },
        ]
        forward_to      = [prometheus.relabel.filter.receiver]
        scrape_interval = "30s"
        metrics_path    = "/metrics"
        clustering { enabled = true }
      }

      // ── Label filtering (drop high-cardinality junk) ──
      prometheus.relabel "filter" {
        forward_to = [prometheus.remote_write.mimir.receiver]
        rule {
          source_labels = ["__name__"]
          regex = "etcd_.*"
          action = "drop"
        }
        rule {
          regex = "container_label_.+"
          action = "labeldrop"
        }
        rule {
          regex = "pod_label_pod_template_hash"
          action = "labeldrop"
        }
      }

      // ── Remote write to Mimir ──
      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://monitoring-mimir-gateway.monitoring.svc:80/api/v1/push"
          headers = {
            "X-Scope-OrgID" = "anonymous",
          }
        }
      }

      // ── OTLP receiver for app instrumentation ──
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          metrics = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          metrics = [otelcol.exporter.prometheus.default.input]
        }
      }

      otelcol.exporter.prometheus "default" {
        forward_to = [prometheus.relabel.filter.receiver]
      }

clustering:
  enabled: true

controller:
  type: statefulset
  replicas: 1

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1536Mi

persistence:
  enabled: true
  size: 10Gi
  storageClass: longhorn

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [k3s-node-1, k3s-node-2]

service:
  enabled: true
  port: 12345

extraPorts:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
