image:
  registry: registry.k8s.io
  repository: kube-state-metrics/kube-state-metrics
  tag: v2.18.0
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k3s-node-1
                - k3s-node-2
