apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: paperless-secrets
  namespace: doppler-operator-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system

  project: rke2-cluster
  config: main

  secrets:
    - PAPERLESS_SECRET_KEY
    - PAPERLESS_ADMIN_USER
    - PAPERLESS_ADMIN_PASSWORD
    - PAPERLESS_DBPASS

  managedSecret:
    name: paperless-secrets
    namespace: paperless
    type: Opaque
---
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: smbcreds-paperless
  namespace: doppler-operator-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system

  project: rke2-cluster
  config: main

  secrets:
    - SMB_USER
    - SMB_PASSWORD

  processors:
    SMB_USER:
      type: plain
      asName: username
    SMB_PASSWORD:
      type: plain
      asName: password

  managedSecret:
    name: smbcreds-paperless
    namespace: paperless
    type: Opaque
