apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-valkey
  namespace: paperless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless-valkey
  template:
    metadata:
      labels:
        app: paperless-valkey
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k3s-node-1]
      containers:
        - name: valkey
          image: docker.io/valkey/valkey@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571  # 8.1.3
          imagePullPolicy: IfNotPresent
          args:
            - valkey-server
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 256Mi
              cpu: 250m
---
apiVersion: v1
kind: Service
metadata:
  name: paperless-valkey
  namespace: paperless
spec:
  type: ClusterIP
  selector:
    app: paperless-valkey
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
