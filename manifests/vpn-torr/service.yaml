# Services (ClusterIP).
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: vpn-torr
spec:
  selector:
    app: vpn-torrent
  ports:
    - name: web
      port: 9090
      targetPort: 9090
    - name: bittorrent-tcp
      port: 6881
      targetPort: 6881
      protocol: TCP
    - name: bittorrent-udp
      port: 6881
      targetPort: 6881
      protocol: UDP
---
