apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-torrent
  namespace: vpn-torr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vpn-torrent
  template:
    metadata:
      labels:
        app: vpn-torrent
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k3s-node-2

      terminationGracePeriodSeconds: 30

      containers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: HTTPPROXY
              value: "on"
            - name: SHADOWSOCKS
              value: "on"
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "wireguard"
            - name: WIREGUARD_ENDPOINT_IP
              valueFrom:
                secretKeyRef:
                  name: vpn-torr-secrets
                  key: WIREGUARD_ENDPOINT_IP
            - name: WIREGUARD_ENDPOINT_PORT
              value: "61115"
            - name: WIREGUARD_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: vpn-torr-secrets
                  key: WIREGUARD_PUBLIC_KEY
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: vpn-torr-secrets
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_PRESHARED_KEY
              valueFrom:
                secretKeyRef:
                  name: vpn-torr-secrets
                  key: WIREGUARD_PRESHARED_KEY
            - name: WIREGUARD_ADDRESSES
              value: "10.66.66.3/32,fd42:42:42::3/128,2603:c021:4000:8b7b::3/128"
            - name: FIREWALL_VPN_INPUT_PORTS
              value: "6881"
            - name: IPV6
              value: "on"
            - name: BLOCK_IPV6
              value: "off"
            - name: FIREWALL_OUTBOUND_SUBNETS_IPV6
              value: "::/0"
            - name: WIREGUARD_MTU
              value: "1400"
            - name: WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL
              value: "25s"
            - name: DNS_KEEP_NAMESERVER
              value: "on"
            - name: FIREWALL_INPUT_PORTS
              value: "9090,9696,8191,8888,8388,9999,6881,5800,6500"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: "192.168.0.0/24,10.42.0.0/16,10.43.0.0/16"
            - name: TZ
              value: "Asia/Kolkata"
          ports:
            - name: http-proxy
              containerPort: 8888
              protocol: TCP
            - name: shadowsocks-tcp
              containerPort: 8388
              protocol: TCP
            - name: shadowsocks-udp
              containerPort: 8388
              protocol: UDP
            - name: health
              containerPort: 9999
              protocol: TCP
          volumeMounts:
            - name: dev-tun
              mountPath: /dev/net/tun

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "Asia/Kolkata"
            - name: WEBUI_PORT
              value: "9090"
            - name: TORRENTING_PORT
              value: "6881"
          ports:
            - name: qbit-web
              containerPort: 9090
              protocol: TCP
            - name: qbit-tcp
              containerPort: 6881
              protocol: TCP
            - name: qbit-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media-nas
              mountPath: /media_2
              mountPropagation: HostToContainer

        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Kolkata"
          ports:
            - name: prowlarr
              containerPort: 9696
              protocol: TCP
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config

        - name: jdownloader2
          image: jlesage/jdownloader-2:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5800
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: USER_ID
              value: "1000"
            - name: GROUP_ID
              value: "1000"
          volumeMounts:
            - name: jdownloader-config
              mountPath: /config
            - name: media-nas
              mountPath: /output_2
              mountPropagation: HostToContainer
          readinessProbe:
            tcpSocket:
              port: 5800
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 5800
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6

        - name: rdtclient
          image: rogerfar/rdtclient@sha256:f10b0891dd2365022b7992bb7fa685ce489fe21153c61cf429d77420a52447ba  # v2.0.127
          imagePullPolicy: IfNotPresent
          ports:
            - name: rdtclient
              containerPort: 6500
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Kolkata"
          volumeMounts:
            - name: rdtclient-db
              mountPath: /data/db
            - name: media-nas
              mountPath: /data/downloads
              subPath: rdtclient
              mountPropagation: HostToContainer

        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: flaresolverr
              containerPort: 8191
              protocol: TCP

      volumes:
        - name: dev-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media-nas
          hostPath:
            path: /mnt/nas/media
            type: Directory
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config
        - name: jdownloader-config
          persistentVolumeClaim:
            claimName: jdownloader-config
        - name: rdtclient-db
          persistentVolumeClaim:
            claimName: rdtclient-db
