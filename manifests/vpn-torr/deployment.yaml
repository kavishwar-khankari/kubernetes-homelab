apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-torrent
  namespace: vpn-torr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vpn-torrent
  template:
    metadata:
      labels:
        app: vpn-torrent
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k3s-node-2

      terminationGracePeriodSeconds: 30

      containers:
        # NOTE: Gluetun VPN sidecar temporarily removed — WireGuard tunnel is
        # flaky (drops/reconnects causing download stalls). Re-add once fixed.
        # See git history for full gluetun container spec.

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "0"
            - name: PGID
              value: "0"
            - name: TZ
              value: "Asia/Kolkata"
            - name: WEBUI_PORT
              value: "9090"
            - name: TORRENTING_PORT
              value: "6881"
          ports:
            - name: qbit-web
              containerPort: 9090
              protocol: TCP
            - name: qbit-tcp
              containerPort: 6881
              protocol: TCP
            - name: qbit-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media-nas
              mountPath: /media_2
              mountPropagation: HostToContainer

        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Kolkata"
          ports:
            - name: prowlarr
              containerPort: 9696
              protocol: TCP
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config

        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: "Asia/Kolkata"
            - name: LOG_LEVEL
              value: "info"
          ports:
            - name: flaresolverr
              containerPort: 8191
              protocol: TCP

      volumes:
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media-nas
          hostPath:
            path: /mnt/nas/media
            type: Directory
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config
