apiVersion: apps/v1
kind: Deployment
metadata:
  name: apprise
  namespace: apprise
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: apprise
  template:
    metadata:
      labels:
        app: apprise
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k3s-node-1, k3s-node-2]
      # Seed Telegram into the existing PVC-backed Apprise configs before the API starts.
      initContainers:
        - name: render-notification-configs
          image: caronc/apprise@sha256:f20fcabea936abde3e910f23bb3ffab36dc350f0e1864aa7e565cad2ea5b547d # v1.4.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /scripts/render-apprise-configs.sh
          envFrom:
            - secretRef:
                name: apprise-secrets
          volumeMounts:
            - name: data
              mountPath: /config
              subPath: config
            - name: scripts
              mountPath: /scripts
              readOnly: true
      containers:
        - name: apprise
          image: caronc/apprise@sha256:f20fcabea936abde3e910f23bb3ffab36dc350f0e1864aa7e565cad2ea5b547d # v1.4.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: APPRISE_STATEFUL_MODE
              value: simple
            - name: APPRISE_WORKER_COUNT
              value: "1"
            - name: APPRISE_ADMIN
              value: "y"
          volumeMounts:
            - name: data
              mountPath: /config
              subPath: config
            - name: data
              mountPath: /attach
              subPath: attach
            - name: data
              mountPath: /plugin
              subPath: plugin
          startupProbe:
            httpGet:
              path: /status
              port: 8000
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /status
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /status
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
        # Bridge direct ntfy publishers into Apprise's telegram-only config.
        - name: ntfy-bridge
          image: binwiederhier/ntfy@sha256:04873ec9343d39595567e9ac761744ef074d168deb5b9bafd5f73392ff18cebf # v2.22.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              exec /scripts/start-ntfy-bridge.sh
          volumeMounts:
            - name: data
              mountPath: /config
              subPath: config
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: 32Mi
              cpu: 20m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: apprise-data
        - name: scripts
          configMap:
            name: apprise-notification-scripts
            defaultMode: 0755
