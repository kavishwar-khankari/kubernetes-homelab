apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: openwebui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k3s-node-1, k3s-node-2]
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui@sha256:172e1fe0e89af2a07f42f2b1d943f30c8ddd7b9c2e182f3678b4790cdb83abea # v0.9.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: WEBUI_URL
              value: https://openwebui.techtronics.top
            - name: OPENAI_API_BASE_URL
              value: https://openrouter.ai/api/v1
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwebui-secrets
                  key: OPENROUTER_API_KEY
            - name: ENABLE_WEB_SEARCH
              value: "true"
            - name: WEB_SEARCH_ENGINE
              value: searxng
            - name: SEARXNG_QUERY_URL
              value: http://searxng.searxng.svc.cluster.local:8080/search?q=<query>
            - name: WEB_SEARCH_CONCURRENT_REQUESTS
              value: "10"
            - name: REDIS_URL
              value: redis://127.0.0.1:6379
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          startupProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
        - name: redis
          image: redis@sha256:02419de7eddf55aa5bcf49efb74e88fa8d931b4d77c07eff8a6b2144472b6952 # 7.4.2-alpine3.21
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 6379
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-data
