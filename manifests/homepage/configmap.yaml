apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: // HOMELAB
    theme: dark
    color: gray
    headerStyle: clean
    statusStyle: dot
    target: _blank
    hideVersion: true
    hideErrors: true
    fullWidth: true
    useEqualHeights: true
    iconStyle: theme
    fiveColumns: true
    layout:
      Networking:
        style: row
        columns: 2
      DevOps:
        style: row
        columns: 2
      Monitoring:
        style: row
        columns: 2
      Media:
        style: row
        columns: 2
      VM Controllers:
        style: row
        columns: 2
      Oracle:
        style: row
        columns: 2
      Cloud:
        style: row
        columns: 2
      Smart Home:
        style: row
        columns: 2
      AI:
        style: row
        columns: 2
    quicklaunch:
      provider: duckduckgo
      searchDescriptions: true

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  proxmox.yaml: ""

  widgets.yaml: |
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        disk: /
        network: true
        uptime: true
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          hour12: true

