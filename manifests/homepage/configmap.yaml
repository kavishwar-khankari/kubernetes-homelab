  custom.css: |
    /* ===== TYPOGRAPHY ===== */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap');

    /* ===== SERVICE CARDS — VISIBLE DISTINCTION ===== */
    .service-card {
      border-radius: 14px !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      transition: all 0.25s ease;
    }
    .service-card:hover {
      border-color: rgba(255, 255, 255, 0.22) !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      transform: translateY(-1px);
    }
    .service-name {
      font-size: 0.82rem !important;
      font-weight: 500 !important;
    }
    .service-description {
      font-size: 0.65rem !important;
      opacity: 0.5;
    }

    /* ===== GROUP HEADERS — PLAYFAIR ===== */
    .service-group-name {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-size: 0.88rem !important;
      font-weight: 600 !important;
      font-style: italic;
      letter-spacing: 0.01em;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 6px;
    }

    /* ===== TABS — CLEAR PILLS ===== */
    nav[class*="tab"], .tab-container {
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    nav[class*="tab"] button, .tab-container button {
      padding: 6px 18px !important;
      border-radius: 9px !important;
      font-size: 0.68rem !important;
      font-weight: 500 !important;
      letter-spacing: 0.04em;
      transition: all 0.2s ease;
    }

    /* ===== BOOKMARKS ===== */
    .bookmark a, .bookmark-card {
      border-radius: 12px !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      transition: all 0.2s ease;
    }
    .bookmark a:hover, .bookmark-card:hover {
      border-color: rgba(255, 255, 255, 0.18) !important;
      transform: translateY(-1px);
    }
    .bookmark-group-name {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-style: italic;
      font-weight: 600 !important;
      font-size: 0.82rem !important;
      padding-bottom: 4px;
    }

    /* ===== PROGRESS BARS ===== */
    .resource-usage [class*="bg-"] {
      border-radius: 2px !important;
    }

    /* ===== FOOTER ===== */
    #footer, #version { display: none !important; }

    /* ===== DATETIME ===== */
    .information-widget-datetime span {
      font-weight: 400 !important;
      letter-spacing: 0.02em;
    }

    /* ===== LIVE WIDGET DOT ===== */
    .service-card:has([class*="widget"]) .service-name::after {
      content: ' ·';
      opacity: 0.45;
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .services-group { flex-basis: 100% !important; }
    }

    /* ===== DEEP OCEAN BACKGROUND ===== */
    body {
      background: var(--void);
      font-family: 'Share Tech Mono', 'JetBrains Mono', monospace;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    #page_wrapper {
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0, 229, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(179, 136, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse 40% 40% at 20% 50%, rgba(0, 230, 118, 0.02) 0%, transparent 50%),
        linear-gradient(180deg, #060e1c 0%, #0a1525 40%, #0c1a2e 100%);
    }

    /* Scan-line overlay */
    #page_wrapper::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 229, 255, 0.008) 2px,
        rgba(0, 229, 255, 0.008) 4px
      );
      opacity: 0.3;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--void); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--cyan-dim), rgba(179, 136, 255, 0.3));
      border-radius: 3px;
    }

    /* ===== TITLE ===== */
    #page_wrapper::after {
      content: '// HOMELAB';
      position: fixed;
      top: 14px;
      left: 24px;
      z-index: 100;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: rgba(0, 229, 255, 0.7);
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
      pointer-events: none;
    }

    /* ===== TABS ===== */
    nav[class*="tab"], .tab-container {
      margin: 8px 0 16px 0;
      padding: 4px;
      background: rgba(6, 18, 36, 0.4);
      border-radius: 14px;
      border: 1px solid var(--border-subtle);
      display: inline-flex;
      gap: 2px;
    }

    nav[class*="tab"] button, .tab-container button {
      padding: 6px 20px !important;
      border-radius: 11px !important;
      font-family: 'Orbitron', sans-serif !important;
      font-size: 0.65rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.12em !important;
      text-transform: uppercase;
      color: var(--text-muted) !important;
      background: transparent !important;
      border: 1px solid transparent !important;
      transition: all var(--transition) !important;
    }

    nav[class*="tab"] button:hover, .tab-container button:hover {
      color: var(--cyan) !important;
      border-color: rgba(0, 229, 255, 0.15) !important;
    }

    nav[class*="tab"] button[data-headlessui-state="selected"],
    .tab-container button[aria-selected="true"] {
      background: rgba(0, 229, 255, 0.12) !important;
      border-color: rgba(0, 229, 255, 0.25) !important;
      color: var(--cyan) !important;
      box-shadow: 0 0 16px rgba(0, 229, 255, 0.12), inset 0 1px 0 rgba(255,255,255,0.05);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    /* ===== SERVICE CARDS ===== */
    .service-card {
      background: var(--card-bg) !important;
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius) !important;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(0, 229, 255, 0.04) 0%, transparent 40%, rgba(179, 136, 255, 0.03) 100%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .service-card:hover {
      background: rgba(8, 21, 42, 0.9) !important;
      border-color: rgba(0, 229, 255, 0.18) !important;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.08), 0 4px 20px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }

    .service-card:hover::before { opacity: 1; }

    .service-name {
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 0.8rem !important;
      font-weight: 400 !important;
      letter-spacing: 0.03em;
      color: var(--text-primary) !important;
    }

    /* ===== SERVICE SVG ICON COLORIZATION ===== */
    .service-card svg[class*="text-theme"], 
    .services-list svg {
      filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.25));
    }

    /* ===== GROUP HEADERS ===== */
    .service-group-name {
      font-family: 'Orbitron', sans-serif !important;
      font-size: 0.7rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.18em !important;
      text-transform: uppercase;
      color: var(--cyan) !important;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
      margin-bottom: 2px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(0, 229, 255, 0.08);
    }

    /* ===== BOOKMARKS ===== */
    .bookmark a, .bookmark-card {
      background: rgba(6, 18, 36, 0.6) !important;
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius) !important;
      transition: all var(--transition);
      overflow: hidden;
    }

    .bookmark a:hover, .bookmark-card:hover {
      background: rgba(8, 21, 42, 0.8) !important;
      border-color: rgba(179, 136, 255, 0.18) !important;
      box-shadow: 0 0 20px rgba(179, 136, 255, 0.06);
    }

    .bookmark-icon {
      background: rgba(179, 136, 255, 0.1) !important;
      font-family: 'Orbitron', sans-serif !important;
      font-weight: 700 !important;
      letter-spacing: 0.05em;
      color: var(--purple) !important;
      border-radius: calc(var(--radius) - 1px) 0 0 calc(var(--radius) - 1px) !important;
      text-shadow: 0 0 6px rgba(179, 136, 255, 0.3);
    }

    .bookmark-name {
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 0.75rem !important;
      letter-spacing: 0.02em;
    }

    .bookmark-description {
      color: var(--text-muted) !important;
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 0.65rem !important;
    }

    .bookmark-group-name {
      font-family: 'Orbitron', sans-serif !important;
      font-size: 0.7rem !important;
      font-weight: 600 !important;
      letter-spacing: 0.15em !important;
      text-transform: uppercase;
      color: var(--purple) !important;
      text-shadow: 0 0 10px rgba(179, 136, 255, 0.2);
    }

    /* ===== WIDGET AREA ===== */
    #information-widgets {
      padding: 20px 24px 16px 24px !important;
      margin-bottom: 0 !important;
    }

    .information-widget-resource {
      background: rgba(6, 18, 36, 0.5);
      border: 1px solid var(--border-subtle);
      border-radius: calc(var(--radius) - 2px);
      padding: 8px 14px !important;
      transition: border-color var(--transition);
    }

    .information-widget-resource:hover {
      border-color: rgba(0, 229, 255, 0.15);
    }

    .resource-icon {
      opacity: 0.6;
    }

    /* Metric bar gradients */
    .resource-usage [class*="bg-"] {
      background: linear-gradient(90deg, var(--cyan), var(--purple)) !important;
      border-radius: 2px !important;
      box-shadow: 0 0 8px rgba(0, 229, 255, 0.25);
    }

    /* ===== SEARCH BAR ===== */
    #information-widgets input[type="text"] {
      background: rgba(6, 18, 36, 0.6) !important;
      border: 1px solid var(--border-subtle) !important;
      border-radius: 12px !important;
      padding: 9px 16px !important;
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 0.75rem !important;
      color: var(--text-primary) !important;
      transition: all var(--transition);
    }

    #information-widgets input[type="text"]::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    #information-widgets input[type="text"]:focus {
      border-color: var(--cyan) !important;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
      outline: none;
    }

    /* ===== DATETIME ===== */
    .information-widget-datetime span {
      font-family: 'Orbitron', sans-serif !important;
      font-weight: 500 !important;
      letter-spacing: 0.05em;
      color: var(--text-primary);
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.15);
    }

    /* ===== STATUS DOTS ===== */
    [class*="status"][class*="dot"] {
      box-shadow: 0 0 8px currentColor;
    }

    /* ===== LIVE WIDGET INDICATOR ===== */
    .service-card:has([class*="widget"]) .service-name::after {
      content: ' ◉';
      color: var(--mint);
      text-shadow: 0 0 6px rgba(0, 230, 118, 0.6);
      font-size: 0.6rem;
      animation: livePulse 2.5s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; text-shadow: 0 0 12px rgba(0, 230, 118, 0.9); }
    }

    /* ===== FOOTER ===== */
    #footer, #version { display: none !important; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .services-group { flex-basis: 100% !important; }
      #page_wrapper::after { font-size: 0.7rem; left: 16px; top: 10px; }
      .service-group-name { font-size: 0.6rem !important; }
    }

    /* ===== SERVICE TAGS / DESCRIPTION ===== */
    .service-description {
      font-family: 'Share Tech Mono', monospace !important;
      font-size: 0.65rem !important;
      color: var(--text-muted) !important;
      opacity: 0.7;
      letter-spacing: 0.03em;
    }

    /* ===== COLLAPSED GROUP ARROW ===== */
    .service-group-name svg {
      color: var(--cyan) !important;
    }

  custom.js: |
    // Custom JS — loaded after page render
