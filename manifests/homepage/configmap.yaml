apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    background:
      opacity: 50
    headerStyle: clean
    statusStyle: dot
    layout:
      Networking:
        tab: Infrastructure
      DevOps:
        tab: Infrastructure
      Monitoring:
        tab: Infrastructure
      Media:
        tab: Media
      VM Controllers:
        tab: Servers
      Oracle:
        tab: Servers
      Cloud:
        tab: Apps
      Smart Home:
        tab: Apps
      AI:
        tab: Apps
    quicklaunch:
      provider: duckduckgo
      searchDescriptions: true
    fullWidth: true
    useEqualHeights: true
    iconStyle: gradient

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: |
    # Docker integration disabled — using kubernetes.yaml instead

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        disk: /
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          hour12: false
    - search:
        provider: duckduckgo
        target: _blank

  services.yaml: |
    - Networking:
        - nginx proxy manager:
            href: http://192.168.0.237:81/
            icon: si-nginxproxymanager
            description: Reverse proxy
        - adguard home:
            href: http://192.168.0.38/
            icon: si-adguard
            description: DNS ad-blocking
        - adguard home vps:
            href: http://ampere-vm:3000/
            icon: si-adguard
            description: VPS DNS ad-blocking
        - librespeed-server-1:
