  custom.css: |
    /* ===== TYPOGRAPHY ===== */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap');
    @import url('https://cdn.jsdelivr.net/npm/@fontsource/cascadia-mono@4.2.1/index.min.css');

    /* ===== BACKGROUND — override broken Tailwind gradient with direct URL ===== */
    #background {
      opacity: 1 !important;
      display: block !important;
      visibility: visible !important;
      background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?w=1920&q=80') !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
    }

    /* ===== SERVICE CARDS — VISIBLE DISTINCTION ===== */
    .service-card {
      border-radius: 14px !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      transition: all 0.25s ease;
    }
    .service-card:hover {
      border-color: rgba(255, 255, 255, 0.22) !important;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      transform: translateY(-1px);
    }
    .service-name {
      font-family: 'Cascadia Mono', 'JetBrains Mono', monospace !important;
      font-size: 0.82rem !important;
      font-weight: 500 !important;
    }
    .service-description {
      font-family: 'Cascadia Mono', 'JetBrains Mono', monospace !important;
      font-size: 0.65rem !important;
      opacity: 0.5;
    }

    /* ===== GROUP HEADERS — PLAYFAIR ===== */
    .service-group-name {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-size: 0.88rem !important;
      font-weight: 600 !important;
      font-style: italic;
      letter-spacing: 0.01em;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 6px;
    }

    /* ===== TABS — CLEAR PILLS ===== */
    nav[class*="tab"], .tab-container {
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    nav[class*="tab"] button, .tab-container button {
      padding: 6px 18px !important;
      border-radius: 9px !important;
      font-size: 0.68rem !important;
      font-weight: 500 !important;
      letter-spacing: 0.04em;
      transition: all 0.2s ease;
    }

    /* ===== BOOKMARKS ===== */
    .bookmark a, .bookmark-card {
      border-radius: 12px !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      transition: all 0.2s ease;
    }
    .bookmark a:hover, .bookmark-card:hover {
      border-color: rgba(255, 255, 255, 0.18) !important;
      transform: translateY(-1px);
    }
    .bookmark-name {
      font-family: 'Cascadia Mono', 'JetBrains Mono', monospace !important;
    }
    .bookmark-group-name {
      font-family: 'Playfair Display', Georgia, serif !important;
      font-style: italic;
      font-weight: 600 !important;
      font-size: 0.82rem !important;
      padding-bottom: 4px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* ===== PROGRESS BARS ===== */
    .resource-usage [class*="bg-"] {
      border-radius: 2px !important;
    }

    /* ===== FOOTER ===== */
    #footer, #version { display: none !important; }

    /* ===== DATETIME ===== */
    .information-widget-datetime span {
      font-weight: 400 !important;
      letter-spacing: 0.02em;
    }

    /* ===== LIVE WIDGET DOT ===== */
    .service-card:has([class*="widget"]) .service-name::after {
      content: ' ·';
      opacity: 0.45;
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .services-group { flex-basis: 100% !important; }
    }

