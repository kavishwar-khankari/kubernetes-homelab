apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    cardBlur: sm
    headerStyle: underlined
    statusStyle: dot
    target: _blank
    layout:
      Networking:
        tab: Infrastructure
      DevOps:
        tab: Infrastructure
      Monitoring:
        tab: Infrastructure
      Media:
        tab: Media
      VM Controllers:
        tab: Servers
      Oracle:
        tab: Servers
      Cloud:
        tab: Apps
      Smart Home:
        tab: Apps
      AI:
        tab: Apps
    quicklaunch:
      provider: duckduckgo
      searchDescriptions: true
    fullWidth: true
    useEqualHeights: true
    iconStyle: gradient
    fiveColumns: true

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  proxmox.yaml: ""

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          hour12: false
    - search:
        provider: duckduckgo
        target: _blank

