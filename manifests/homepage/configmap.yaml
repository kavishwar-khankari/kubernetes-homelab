    .theme-gray [data-name="Calendar"] .service-container .flex.flex-col > div:first-child .truncate > div,
    .theme-gray [data-name="Calendar"] .service-container .flex.flex-col > div:first-child > .flex.flex-row > span.w-12 > span {
      color: var(--accent) !important;
