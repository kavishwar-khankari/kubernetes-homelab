apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: // HOMELAB
    theme: dark
    color: gray
    headerStyle: clean
    statusStyle: dot
    target: _blank
    hideVersion: true
    hideErrors: true
    fullWidth: true
    useEqualHeights: true
    iconStyle: theme
    fiveColumns: true
    background:
      image: https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1920&q=80
      blur: sm
      opacity: 55
    layout:
      Networking:
        tab: Infrastructure
        style: row
        columns: 2
      DevOps:
        tab: Infrastructure
        style: row
        columns: 2
      Monitoring:
        tab: Infrastructure
        style: row
        columns: 2
      Media:
        tab: Media
        style: row
        columns: 2
      VM Controllers:
        tab: Servers
        style: row
        columns: 2
      Oracle:
        tab: Servers
        style: row
        columns: 2
      Cloud:
        tab: Apps
        style: row
        columns: 2
      Smart Home:
        tab: Apps
        style: row
        columns: 2
      AI:
        tab: Apps
        style: row
        columns: 2
    quicklaunch:
      provider: duckduckgo
      searchDescriptions: true

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  proxmox.yaml: ""

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          hour12: true

