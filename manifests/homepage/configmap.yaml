apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: // HOMELAB
    theme: dark
    color: stone
    cardBlur: md
    headerStyle: underlined
    statusStyle: dot
    target: _blank
    background:
      image: https://images.unsplash.com/photo-1511497584788-876760111969?w=1920&q=80
      blur: sm
      opacity: 90
    layout:
      Networking:
        tab: Infrastructure
      DevOps:
        tab: Infrastructure
      Monitoring:
        tab: Infrastructure
      Media:
        tab: Media
        style: row
        columns: 2
      VM Controllers:
        tab: Servers
        style: row
        columns: 2
      Oracle:
        tab: Servers
        style: row
        columns: 2
      Cloud:
        tab: Apps
        style: row
        columns: 2
      Smart Home:
        tab: Apps
      AI:
        tab: Apps
    quicklaunch:
      provider: duckduckgo
      searchDescriptions: true
    fullWidth: true
    useEqualHeights: true
    iconStyle: gradient
    fiveColumns: true

  kubernetes.yaml: |
    mode: cluster

  docker.yaml: ""

  proxmox.yaml: ""

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          hour12: true

