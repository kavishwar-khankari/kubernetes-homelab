  custom.js: |
    // custom.js — runtime DOM patches that pair with custom.css
    //
    // 1. Queue scroll-wrap: gathers loose *arr QueueEntry rows into a single
    //    .hp-queue-scroll div so CSS can cap them with overflow-y: auto.
    //
    // 2. Tailscale status swap: replaces "Last Seen: NOW / 5m ago" with
    //    "Status: ONLINE / OFFLINE" — a more meaningful at-a-glance signal.
    //
    // 3. Topbar synthesis: injects a minimal topbar (#hp-topbar) with the
    //    "chonker" wordmark and a live clock. Built via createElement +
    //    textContent (CSP-safe; no innerHTML).
    //
    // 4. Hero sparklines: samples each .information-widget-resource's pct
    //    on every tick into a ring buffer (200 samples), persists to
    //    localStorage, draws a subtle line+fill onto a canvas appended
    //    inside each widget (z-index 0, behind text).
    //
    // 5. Bazarr "caught up": when all Bazarr blocks read "0", toggle
    //    .hp-caught-up on the card so CSS swaps to a green ✓ overlay.
    //
    // All run via a debounced MutationObserver — homepage's SWR refresh
    // re-renders widgets every ~5s, so re-applying patches each pass keeps
    // them sticky.
    
    (function () {
      let scheduled = false;
    
      // ─── 0. Sparkline buffers ──────────────────────────────────────
      // Keyed by widget index (CPU=0, RAM=1, disk1=2, disk2=3). Persisted
      // to localStorage so history survives reloads. Capacity 200 samples
      // (~17 min at the 5s SWR cadence, or shorter at the 500ms tick if
      // values change every sample).
    
      const SPARK_CAP = 300;       // ~5 min at 1Hz
      const SPARK_TICK_MS = 1000;  // sample once per second
      const SPARK_KEY = "hp-sparks-v1";
      let sparkBuffers = {};
      try {
        sparkBuffers = JSON.parse(localStorage.getItem(SPARK_KEY) || "{}");
      } catch (e) {
        sparkBuffers = {};
      }
      const lastSparkSampleAt = {};
      let lastSparkPersist = 0;
      function maybePersistSparks() {
        const now = Date.now();
        if (now - lastSparkPersist < 30000) return;
        lastSparkPersist = now;
        try {
          localStorage.setItem(SPARK_KEY, JSON.stringify(sparkBuffers));
        } catch (e) {
          /* quota or disabled — silently ignore */
        }
      }
    
      function sampleAndDrawSparks() {
        const now = Date.now();
        const widgets = document.querySelectorAll(".information-widget-resource");
        widgets.forEach((w, i) => {
          const bar = w.querySelector(".resource-usage > div");
          if (!bar) return;
          const pct = parseFloat(bar.style.width);
          if (isNaN(pct)) return;
    
          const key = `widget-${i}`;
          if (!Array.isArray(sparkBuffers[key])) sparkBuffers[key] = [];
          const buf = sparkBuffers[key];
    
          // Fixed-rate sample: push at most once per SPARK_TICK_MS so all
          // metrics — moving ones (CPU) AND static ones (disks) — accumulate
          // a comparable amount of history.
          const lastAt = lastSparkSampleAt[key] || 0;
          if (now - lastAt >= SPARK_TICK_MS) {
            buf.push(pct);
            if (buf.length > SPARK_CAP) buf.shift();
            lastSparkSampleAt[key] = now;
            maybePersistSparks();
          }
    
          drawSparkline(w, buf);
        });
      }
    
      function drawSparkline(widget, history) {
        let canvas = widget.querySelector(":scope > .hp-sparkline");
        if (!canvas) {
          canvas = document.createElement("canvas");
          canvas.className = "hp-sparkline";
          widget.appendChild(canvas);
        }
    
        const rect = widget.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;
    
        const dpr = window.devicePixelRatio || 1;
        const dw = Math.round(rect.width * dpr);
        const dh = Math.round(rect.height * dpr);
        if (canvas.width !== dw || canvas.height !== dh) {
          canvas.width = dw;
          canvas.height = dh;
          canvas.style.width = rect.width + "px";
          canvas.style.height = rect.height + "px";
        }
    
        const ctx = canvas.getContext("2d");
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, rect.width, rect.height);
    
        if (history.length < 2) return;
    
        // Color follows severity of the most recent value, so a sparkline
        // visually agrees with the gauge bar and label classes.
        const last = history[history.length - 1];
        let stroke, fill;
        if (last >= 90) {
          stroke = "rgba(243, 139, 168, 0.45)";
          fill = "rgba(243, 139, 168, 0.10)";
        } else if (last >= 75) {
          stroke = "rgba(249, 226, 175, 0.45)";
          fill = "rgba(249, 226, 175, 0.10)";
        } else {
          stroke = "rgba(203, 166, 247, 0.35)";
          fill = "rgba(203, 166, 247, 0.07)";
        }
    
        const pad = 4;
        const w = rect.width - pad * 2;
        const h = rect.height - pad * 2;
        const denom = Math.max(1, SPARK_CAP - 1);
        const offset = SPARK_CAP - history.length; // right-align history
    
        const points = history.map((pct, i) => {
          const x = pad + ((offset + i) / denom) * w;
          const y = pad + h - (Math.max(0, Math.min(100, pct)) / 100) * h;
          return { x, y };
        });
    
        // Filled area under the line
        ctx.beginPath();
        ctx.moveTo(points[0].x, pad + h);
        points.forEach((p) => ctx.lineTo(p.x, p.y));
        ctx.lineTo(points[points.length - 1].x, pad + h);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
    
        // Line stroke
        ctx.beginPath();
        points.forEach((p, i) => {
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1.25;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      }
    
      // ─── 0a. Half-width row freeze ─────────────────────────────────
      // Photos+Monitoring share a flex row. `align-items: stretch` ties their
      // heights together when both open; flipping to `flex-start` for the
      // close transition makes the *other* group snap to its natural (shorter)
      // height the instant a collapse starts. We freeze the other group's
      // min-height at click time so it stays put while its neighbor collapses.
      //
      // Uses event delegation on the document (capture phase) so the
      // handler survives React re-mounting the buttons — an instance-bound
      // addEventListener would silently disappear on SWR refresh.
    
      let halfWidthFreezeBound = false;
      function setupHalfWidthFreeze() {
        if (halfWidthFreezeBound) return;
        halfWidthFreezeBound = true;
    
        document.addEventListener(
          "click",
          (e) => {
            const button = e.target.closest("button");
            if (!button) return;
            const group = button.closest(
              "#layout-groups > .services-group"
            );
            if (!group) return;
            const layout = group.parentElement;
            if (!layout || layout.id !== "layout-groups") return;
    
            // Only the last two services-groups (Photos + Monitoring) are
            // in the half-width row.
            const siblings = Array.from(layout.children).filter((g) =>
              g.classList.contains("services-group")
            );
            const idx = siblings.indexOf(group);
            const isLast = idx === siblings.length - 1;
            const isSecondLast = idx === siblings.length - 2;
            if (!isLast && !isSecondLast) return;
    
            const other = isLast
              ? siblings[siblings.length - 2]
              : siblings[siblings.length - 1];
            if (!other) return;
    
            const aboutToClose = button.getAttribute("aria-expanded") === "true";
            const otherBtn = other.querySelector(":scope > button");
            const otherOpen =
              otherBtn && otherBtn.getAttribute("aria-expanded") === "true";
    
            if (aboutToClose && otherOpen) {
              // Use definite `height` (not min-height) so the inner flex
              // chain — wrapper → ul → li → card — has a definite parent
              // size for `height: 100%` / `calc(100% - 12px)` to resolve
              // against. With min-height only, the chain treats the size
              // as indefinite and the ul/card collapse to their natural
              // content size, making the card appear to shrink even though
              // the group itself is held steady.
              const h = other.getBoundingClientRect().height;
              other.style.height = h + "px";
            } else {
              setTimeout(() => {
                other.style.height = "";
              }, 240);
            }
          },
          { capture: true }
        );
      }
    
      // ─── 0b. Bazarr "caught up" detection ──────────────────────────
      function detectCaughtUp() {
        document.querySelectorAll(".service-card").forEach((card) => {
          const img = card.querySelector("img");
          if (!img || !img.src.toLowerCase().includes("bazarr")) return;
    
          const blocks = card.querySelectorAll(".service-block");
          if (blocks.length < 2) return;
    
          const allZero = Array.from(blocks).every((b) => {
            const val = b.querySelector(
              ".font-thin, .text-xl, .text-2xl, .text-3xl, .text-sm:not(.uppercase)"
            );
            return val && val.textContent.trim() === "0";
          });
    
          card.classList.toggle("hp-caught-up", allZero);
        });
      }
    
      // ─── 1. Queue scroll-wrap ──────────────────────────────────────
    
      function isQueueRow(el) {
        return (
          el instanceof HTMLElement &&
          el.tagName === "DIV" &&
          el.classList.contains("h-5") &&
          el.classList.contains("rounded-md") &&
          el.className.includes("bg-theme-200/50")
        );
      }
    
      function wrapQueues() {
        document.querySelectorAll("li.service-card, .service-card").forEach((card) => {
          const looseRows = Array.from(card.children).filter(isQueueRow);
          if (looseRows.length === 0) return;
    
          let wrapper = card.querySelector(":scope > .hp-queue-scroll");
          if (!wrapper) {
            wrapper = document.createElement("div");
            wrapper.className = "hp-queue-scroll";
            card.insertBefore(wrapper, looseRows[0]);
          }
          looseRows.forEach((row) => wrapper.appendChild(row));
        });
      }
    
      // ─── 2. Tailscale status swap ──────────────────────────────────
    
      // Considered "online" if last_seen is "NOW" or a recent relative time.
      // The widget's strings look like: "NOW", "5m", "2h", "3d ago", etc.
      function isRecent(text) {
        if (!text) return false;
        const t = text.trim().toUpperCase();
        if (t === "NOW") return true;
        // Match "5M", "30S", "2H" — anything in seconds/minutes/hours counts as online.
        if (/^\d+\s*(S|M|H|SEC|MIN|HR|SECOND|MINUTE|HOUR)S?(\s*AGO)?$/.test(t)) return true;
        return false;
      }
    
      function swapTailscaleStatus() {
        document.querySelectorAll(".service-card").forEach((card) => {
          const img = card.querySelector("img");
          if (!img || !img.src.toLowerCase().includes("tailscale")) return;
    
          card.querySelectorAll(".service-block").forEach((block) => {
            const valueEl = block.querySelector(".text-xl, .text-2xl, .font-thin");
            const labelEl = block.querySelector(".uppercase");
            if (!valueEl || !labelEl) return;
    
            const txt = valueEl.textContent.trim();
            if (!txt || txt === "-") return; // still loading
    
            // Already swapped to ONLINE/OFFLINE? Just make sure the label stays STATUS.
            // (Old code bailed here on the label check, so when React re-rendered the
            // value back to "Now" the function couldn't re-swap.)
            if (txt === "ONLINE" || txt === "OFFLINE") {
              if (labelEl.textContent.trim().toUpperCase() !== "STATUS") {
                labelEl.textContent = "STATUS";
              }
              return;
            }
    
            // Detect last_seen format: "Now", "5m", "2h", "3d ago", "1w", "Never"
            const online = isRecent(txt);
            const isLongAgo = /\b(D|W|MO|MONTH|Y|YEAR|NEVER)/i.test(txt) || txt === "Never";
            if (!online && !isLongAgo) return; // unknown format — leave it alone
    
            const desired = online ? "ONLINE" : "OFFLINE";
            valueEl.textContent = desired;
            valueEl.style.color = online ? "var(--green)" : "var(--red)";
            valueEl.style.textShadow = online
              ? "0 0 8px rgba(166, 227, 161, 0.4)"
              : "0 0 8px rgba(243, 139, 168, 0.4)";
            if (labelEl.textContent.trim().toUpperCase() !== "STATUS") {
              labelEl.textContent = "STATUS";
            }
          });
        });
      }
    
      // ─── 3. Topbar synthesis ───────────────────────────────────────
    
      let clockInterval = null;
    
      function buildTopbar() {
        if (document.getElementById("hp-topbar")) return;
    
        const bar = document.createElement("div");
        bar.id = "hp-topbar";
    
        const title = document.createElement("div");
        title.id = "hp-topbar-title";
        title.textContent = "chonker";
    
        const meta = document.createElement("div");
        meta.id = "hp-topbar-meta";
    
        const time = document.createElement("span");
        time.id = "hp-topbar-time";
    
        const sep = document.createElement("span");
        sep.id = "hp-topbar-sep";
        sep.textContent = "·";
    
        const date = document.createElement("span");
        date.id = "hp-topbar-date";
    
        meta.appendChild(time);
        meta.appendChild(sep);
        meta.appendChild(date);
    
        bar.appendChild(title);
        bar.appendChild(meta);
    
        document.body.insertBefore(bar, document.body.firstChild);
        updateClock();
      }
    
      function updateClock() {
        const t = document.getElementById("hp-topbar-time");
        const d = document.getElementById("hp-topbar-date");
        if (!t || !d) return;
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        t.textContent = `${hh}:${mm}`;
        d.textContent = now.toLocaleDateString(undefined, {
          weekday: "long",
          month: "long",
          day: "numeric",
        });
      }
    
      function ensureClockTicking() {
        if (clockInterval) return;
        clockInterval = setInterval(updateClock, 30 * 1000); // 30s is plenty for HH:MM
      }
    
      // ─── 4. Severity classification (gauges + ping pills) ─────────
      // Applies .hp-warn / .hp-bad classes for CSS to colour the bar/text.
    
      const GAUGE_WARN_PCT = 75;
      const GAUGE_BAD_PCT  = 90;
      const PING_WARN_MS   = 100;
      const PING_BAD_MS    = 500;
    
      function classifyGauges() {
        document.querySelectorAll(".information-widget-resource").forEach((w) => {
          const bar = w.querySelector(".resource-usage > div");
          if (!bar) return;
          const pct = parseFloat(bar.style.width);
          if (isNaN(pct)) return;
          w.classList.remove("hp-warn", "hp-bad");
          if (pct >= GAUGE_BAD_PCT) w.classList.add("hp-bad");
          else if (pct >= GAUGE_WARN_PCT) w.classList.add("hp-warn");
        });
      }
    
      function classifyPings() {
        document.querySelectorAll(".service-card").forEach((card) => {
          const pingText = card.querySelector(".site-monitor-status > div");
          if (!pingText) return;
          const m = pingText.textContent.match(/(\d+)\s*ms/i);
          if (!m) return;
          const ms = parseInt(m[1], 10);
          card.classList.remove("hp-warn", "hp-bad");
          if (ms >= PING_BAD_MS) card.classList.add("hp-bad");
          else if (ms >= PING_WARN_MS) card.classList.add("hp-warn");
        });
      }
    
      // ─── 5. Hero-row relocation ────────────────────────────────────
      // Move the Upcoming services-group beside the System hero
      // (#information-widgets) so the two sit in a single horizontal row.
    
      function relocateHeroRow() {
        const hero = document.getElementById("information-widgets");
        if (!hero) return;
    
        // Find the Upcoming group: the .services-group whose h2 text is "Upcoming".
        // Look both inside #layout-groups (default location) and inside the
        // existing .hp-hero-row (so we don't grab our own clone).
        let upcoming = null;
        document.querySelectorAll("#layout-groups .services-group h2").forEach((h) => {
          if (h.textContent.trim() === "Upcoming") {
            upcoming = h.closest(".services-group");
          }
        });
    
        let row = document.querySelector(".hp-hero-row");
    
        if (!row) {
          row = document.createElement("div");
          row.className = "hp-hero-row";
          hero.parentNode.insertBefore(row, hero);
        }
    
        // Move hero into row if it isn't already.
        if (hero.parentNode !== row) {
          row.appendChild(hero);
        }
    
        // Move upcoming into row if found and not already there.
        if (upcoming && upcoming.parentNode !== row) {
          // If row already contains a stale Upcoming clone, drop it first.
          const stale = row.querySelector(".services-group");
          if (stale && stale !== upcoming) {
            stale.remove();
          }
          row.appendChild(upcoming);
        }
      }
    
      // ─── Scheduler ─────────────────────────────────────────────────
    
      // ─── Group order enforcement ──────────────────────────────────
      // Homepage reorders groups by size (largest first). We override that
      // and force the design's intended visual order: Media → Servarrs → ...
    
      const DESIRED_GROUP_ORDER = [
        "Media", "Servarrs", "Downloads", "Photos", "Monitoring",
      ];
    
      function enforceGroupOrder() {
        const container = document.getElementById("layout-groups");
        if (!container) return;
        const groups = {};
        container.querySelectorAll(":scope > .services-group").forEach((g) => {
          const name = g.querySelector("h2")?.textContent.trim();
          if (name) groups[name] = g;
        });
        // Re-append in desired order — appendChild moves existing nodes.
        DESIRED_GROUP_ORDER.forEach((name) => {
          if (groups[name]) container.appendChild(groups[name]);
        });
      }
    
      function runAll() {
        // buildTopbar() — disabled; the user dislikes the top bar.
        // relocateHeroRow() — disabled; we no longer place hero+calendar side-by-side.
        // enforceGroupOrder() — disabled; YAML order is respected
        classifyGauges();
        classifyPings();
        // wrapQueues() — disabled: moving DOM nodes breaks React reconciliation (NotFoundError on removeChild)
        swapTailscaleStatus();
        sampleAndDrawSparks();
        detectCaughtUp();
        setupHalfWidthFreeze();
      }
    
      function schedule() {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(() => {
          scheduled = false;
          runAll();
        });
      }
    
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", schedule);
      } else {
        schedule();
      }
    
      ensureClockTicking();
    
      // Re-run every 500 ms as well — React re-renders can replace
      // .services-group nodes faster than the MutationObserver fires.
      setInterval(schedule, 500);
    
      new MutationObserver(schedule).observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true,
      });
    })();
    
