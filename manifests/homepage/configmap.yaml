    /* Photos group (2nd from last): force Immich's 4 stats into 2x2 grid */
    .theme-gray #layout-groups > .services-group:nth-last-child(2) .service-container {
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    }
    
    /* Monitoring group (last): force 2 cards per row (Beszel + Tailscale).
       Override needed because homepage caches columns:2 → columns:4 at SSR. */
    .theme-gray #layout-groups > .services-group:nth-last-child(1) ul.services-list {
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
    }
    
    .theme-gray #bookmarks {
