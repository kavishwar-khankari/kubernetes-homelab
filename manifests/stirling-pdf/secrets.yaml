apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: stirling-pdf-secrets
  namespace: doppler-operator-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system
  project: rke2-cluster
  config: main
  secrets:
    - STIRLING_PDF_ADMIN_USERNAME
    - STIRLING_PDF_ADMIN_PASSWORD
  processors:
    STIRLING_PDF_ADMIN_USERNAME:
      type: plain
      asName: SECURITY_INITIALLOGIN_USERNAME
    STIRLING_PDF_ADMIN_PASSWORD:
      type: plain
      asName: SECURITY_INITIALLOGIN_PASSWORD
  managedSecret:
    name: stirling-pdf-secrets
    namespace: stirling-pdf
    type: Opaque
