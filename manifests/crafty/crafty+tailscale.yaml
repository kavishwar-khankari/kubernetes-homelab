# =============================================================================
# ServiceAccount + RBAC for Tailscale sidecar
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minecraft-tailscale
  namespace: minecraft
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: minecraft-tailscale
  namespace: minecraft
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: minecraft-tailscale
  namespace: minecraft
subjects:
  - kind: ServiceAccount
    name: minecraft-tailscale
    namespace: minecraft
roleRef:
  kind: Role
  name: minecraft-tailscale
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft-server
  namespace: minecraft
  labels:
    app: minecraft-server
spec:
  serviceName: minecraft-server
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-server
  template:
    metadata:
      labels:
        app: minecraft-server
    spec:
      serviceAccountName: minecraft-tailscale
      containers:
        # =====================================================================
        # Container 1: Crafty Controller 4
        # Web UI on 8443 (HTTPS), game server on 25566 (internal)
        # =====================================================================
        - name: crafty
          image: registry.gitlab.com/crafty-controller/crafty-4:4.10.0
          ports:
            - containerPort: 8443
              name: web-ui
              protocol: TCP
            - containerPort: 25566
              name: minecraft
              protocol: TCP
          env:
            - name: TZ
              value: "Asia/Kolkata"
          volumeMounts:
            - name: crafty-data
              mountPath: /crafty/backups
              subPath: backups
            - name: crafty-data
              mountPath: /crafty/logs
              subPath: logs
            - name: crafty-data
              mountPath: /crafty/servers
              subPath: servers
            - name: crafty-data
              mountPath: /crafty/app/config
              subPath: app-config
            - name: crafty-data
              mountPath: /crafty/import
              subPath: import
          resources:
            requests:
              memory: "4Gi"
              cpu: "1000m"
            limits:
              memory: "6Gi"
              cpu: "4000m"
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5

        # =====================================================================
        # Container 2: Tailscale Sidecar
        # Runs in tun mode — NO tailscale serve, NO netstack proxy.
        # Just establishes the WireGuard tunnel. socat handles forwarding.
        # =====================================================================
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY_MINECRAFT
              valueFrom:
                secretKeyRef:
                  name: minecraft-doppler
                  key: TS_AUTHKEY_MINECRAFT
            - name: TS_HOSTNAME
              value: "minecraft"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_USERSPACE
              value: "false"
            - name: TS_EXTRA_ARGS
              value: "--advertise-tags=tag:minecraft"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
            - name: tun-device
              mountPath: /dev/net/tun
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

        # =====================================================================
        # Container 3: socat TCP forwarder
        # Listens on 25565 (what friends connect to via Tailscale IP)
        # Forwards to 127.0.0.1:25566 (where Minecraft actually listens)
        # Uses kernel TCP stack — no netstack, no packet drops.
        # =====================================================================
        - name: socat-forwarder
          image: alpine/socat:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for tailscale0 interface..."
              while ! ip addr show tailscale0 2>/dev/null | grep -q "inet "; do
                sleep 2
              done
              echo "tailscale0 is up, starting TCP forwarder on port 25565"
              exec socat TCP-LISTEN:25565,fork,reuseaddr TCP:127.0.0.1:25566
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "100m"

      volumes:
        - name: crafty-data
          persistentVolumeClaim:
            claimName: crafty-data
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: tailscale-state
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice

      terminationGracePeriodSeconds: 120