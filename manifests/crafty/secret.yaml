# =============================================================================
# Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: minecraft
---
# =============================================================================
# DopplerSecret — syncs TS_AUTHKEY from Doppler
# Create a Doppler project "minecraft" with config "prd" containing:
#   TS_AUTHKEY=tskey-auth-xxxxx (reusable, pre-approved, tag:minecraft-server)
#
# Crafty manages its own admin credentials via first-run setup in the web UI,
# so no need to inject those via Doppler.
# =============================================================================
apiVersion: secrets.doppler.com/v1alpha1
kind: DopplerSecret
metadata:
  name: minecraft-doppler
  namespace: doppler-operator-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  tokenSecret:
    name: doppler-token-secret
    namespace: doppler-operator-system

  project: rke2-cluster
  config: main

  secrets:
    - TS_AUTHKEY_MINECRAFT

  managedSecret:
    name: minecraft-doppler
    namespace: minecraft
    type: Opaque
