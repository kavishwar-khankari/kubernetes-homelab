# =============================================================================
# Ingress — Crafty web UI at crafty.techtronics.top
# Uses HTTPS backend annotation since Crafty serves on 8443 with self-signed TLS.
# Adjust annotations for your ingress controller (nginx example below).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crafty-ingress
  namespace: minecraft
  labels:
    app: minecraft-server
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    nginx.ingress.kubernetes.io/server-snippets: |
      location / {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
spec:
  ingressClassName: nginx     # Adjust to match your cluster's ingress class
  rules:
    - host: crafty.techtronics.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crafty-web
                port:
                  number: 8443