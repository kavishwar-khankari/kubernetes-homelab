apiVersion: apps/v1
kind: Deployment
metadata:
  name: tachidesk
  namespace: tachidesk
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tachidesk
  template:
    metadata:
      labels:
        app: tachidesk
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k3s-node-1, k3s-node-2]
      containers:
      - name: tachidesk
        image: ghcr.io/suwayomi/suwayomi-server@sha256:6bb8fa8cf1cf86589e5851f2f1c2ede5c8248d53982ec1795a715dcde85b1da2 # v2.2.2100
        imagePullPolicy: IfNotPresent
        ports:
        - name: web
          containerPort: 4567
        env:
        - name: TZ
          value: "Asia/Kolkata"
        - name: DEBUG
          value: "true"
        - name: BIND_IP
          value: "0.0.0.0"
        - name: BIND_PORT
          value: "4567"
        - name: AUTH_MODE
          value: "ui_login"
        - name: AUTH_USERNAME
          valueFrom:
            secretKeyRef:
              name: tachidesk-secrets
              key: AUTH_USERNAME
        - name: AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tachidesk-secrets
              key: AUTH_PASSWORD
        - name: JWT_TOKEN_EXPIRY
          value: "5m"
        - name: JWT_REFRESH_EXPIRY
          value: "30d"
        - name: SOCKS_PROXY_ENABLED
          value: "false"
        - name: DOWNLOAD_AS_CBZ
          value: "true"
        - name: MAX_PARALLEL_UPDATE
          value: "6"
        volumeMounts:
        - name: tachidesk-config
          mountPath: /home/suwayomi/.local/share/Tachidesk
      
      volumes:
      - name: tachidesk-config
        persistentVolumeClaim:
          claimName: tachidesk-config