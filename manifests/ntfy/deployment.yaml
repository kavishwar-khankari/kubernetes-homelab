apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: ntfy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [k3s-node-1, k3s-node-2]
      containers:
        - name: ntfy
          image: binwiederhier/ntfy@sha256:04873ec9343d39595567e9ac761744ef074d168deb5b9bafd5f73392ff18cebf # v2.22.0
          imagePullPolicy: IfNotPresent
          command: ["serve"]
          ports:
            - name: http
              containerPort: 80
          env:
            - name: TZ
              value: Asia/Kolkata
            - name: NTFY_BASE_URL
              value: https://ntfy.techtronics.top
            - name: NTFY_BEHIND_PROXY
              value: "true"
            - name: NTFY_CACHE_FILE
              value: /var/lib/ntfy/cache.db
            - name: NTFY_AUTH_FILE
              value: /var/lib/ntfy/auth.db
            - name: NTFY_AUTH_DEFAULT_ACCESS
              value: deny-all
            - name: NTFY_ENABLE_LOGIN
              value: "true"
            - name: NTFY_ATTACHMENT_CACHE_DIR
              value: /var/lib/ntfy/attachments
          volumeMounts:
            - name: data
              mountPath: /var/lib/ntfy
          startupProbe:
            httpGet:
              path: /v1/health
              port: 80
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 80
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 80
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ntfy-data
